<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO & Social -->

  <meta property="og:title" content="The Toshi Order • Bitcoin Ordinals" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --black: #05040a;
      --deep: #0d0b10;
      --ember: #c1440e;
      --gold: #d4850a;
      --amber: #f0a500;
      --pale-gold: #f5c842;
      --ash: #6b6070;
      --fog: #a89db0;
      --white: #f0ead8;
      --glow: rgba(212, 133, 10, 0.25);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: linear-gradient(to bottom, rgba(5,4,10,0.98), transparent);
      border-bottom: 1px solid rgba(212,133,10,0.08);
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--amber);
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--ash);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--amber);
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 8rem 2rem 6rem;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(193,68,14,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(212,133,10,0.08) 0%, transparent 60%),
        var(--black);
    }

    .hero-bg::before,
    .hero-bg::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      animation: slowSpin 80s linear infinite;
    }

    .hero-bg::before {
      width: 700px; height: 700px;
      border: 1px solid rgba(212,133,10,0.06);
    }

    .hero-bg::after {
      width: 500px; height: 500px;
      border: 1px solid rgba(193,68,14,0.07);
      animation-direction: reverse;
      animation-duration: 50s;
    }

    @keyframes slowSpin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* ... rest of your styles remain mostly the same ... */

    @media (max-width: 768px) {
      nav {
        padding: 1rem 1.5rem;
      }

      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--deep);
        padding: 1.5rem;
        border-top: 1px solid rgba(212,133,10,0.15);
      }

      .nav-links.active {
        display: flex;
      }

      /* You can add a hamburger later */
    }
  </style>
</head>

    <div class="hero-cta">
      <a href="https://ordinals.com/inscription/123045909" class="btn-primary">View Gallery</a>
      <a href="https://x.com/TheToshiOrder" class="btn-secondary">Join The Order</a>
    </div>
  </section>

</html>
