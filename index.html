<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Toshi Order • Bitcoin Ordinals</title>
  <meta name="description" content="3,333 self-inscribed Toshis on Bitcoin. No team mint. No compromise. Conviction only. Forever on-chain."/>

  <style>
    :root {
      --bg: #000000;
      --orange: #f7931a;
      --orange-glow: #ffaa44;
      --text: #eeeeee;
      --muted: #999999;
      --card: #111111;
      --border: #222222;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(247,147,26,0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255,68,68,0.04) 0%, transparent 40%);
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    header {
      position: fixed;
      top: 0; width: 100%;
      background: rgba(0,0,0,0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      z-index: 100;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 0;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(247,147,26,0.6);
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 2.5rem;
      font-weight: 700;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--orange); }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 0 6rem;
    }

    .hero h1 {
      font-size: clamp(6rem, 14vw, 14rem);
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: -8px;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #f7931a, #ff4444, #f7931a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px rgba(247,147,26,0.5);
    }

    .subtitle {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffaa44;
      letter-spacing: 6px;
      margin-bottom: 2rem;
      text-shadow: 0 0 25px rgba(255,170,68,0.6);
    }

    .tagline {
      font-size: 1.6rem;
      color: #bbb;
      max-width: 820px;
      margin: 0 auto 3.5rem;
    }

    .toshi-mascot {
      max-width: 520px;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      border: 8px solid #f7931a;
      border-radius: 12px;
      box-shadow: 
        0 0 40px rgba(247,147,26,0.7),
        0 0 80px rgba(255,68,68,0.5),
        inset 0 0 30px rgba(247,147,26,0.4);
      margin: 3rem auto 4rem;
      transition: transform 0.4s;
    }

    .toshi-mascot:hover { transform: scale(1.03); }

    .cta-buttons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1.3rem 3.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      transition: all 0.35s;
    }

    .btn-primary {
      background: var(--orange);
      color: #000;
      box-shadow: 0 0 30px rgba(247,147,26,0.6);
    }

    .btn-primary:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 60px rgba(247,147,26,0.9);
    }

    .btn-outline {
      border: 3px solid var(--orange);
      color: var(--orange);
      background: transparent;
    }

    .btn-outline:hover {
      background: var(--orange);
      color: #000;
      transform: translateY(-6px);
    }

    .power-statement {
      font-size: 2.8rem;
      font-weight: 900;
      color: #ff4444;
      text-align: center;
      margin: 5rem 0 4rem;
      letter-spacing: 4px;
      text-shadow: 0 0 40px rgba(255,68,68,0.7);
    }

    footer {
      background: #000;
      padding: 6rem 0 4rem;
      text-align: center;
      border-top: 1px solid #222;
    }

    .footer-links a {
      color: #999;
      margin: 0 1.8rem;
      font-size: 1.2rem;
      text-decoration: none;
    }

    .footer-links a:hover { color: var(--orange); }

    @media (max-width: 768px) {
      .hero h1 { font-size: 7.5rem; }
      .subtitle { font-size: 1.8rem; }
      .toshi-mascot { max-width: 380px; }
      .power-statement { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <div class="logo">THE TOSHI ORDER</div>
        <div class="nav-links">
          <a href="https://ordinals.com/inscription/1a4487aeb9de2c8dcf36f3e531a038d8a3acfeeb0bd123aeb7212a82c334ad15i0">GALLERY</a>
          <a href="https://ordinalswallet.com/collection/toshis">MARKET</a>
          <a href="https://discord.gg/cRw9GWWDXc">DISCORD</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <div class="subtitle">BITCOIN • NATIVE • ORDINALS</div>
          <h1>THE <span>TOSHI</span> ORDER</h1>
          <p class="tagline">
            3,333 self-inscribed warriors forged on Bitcoin<br>
            NO TEAM MINT • NO COMPROMISE • CONVICTION ONLY
          </p>

          <img 
            src="https://files.catbox.moe/0k3q8z.png" 
            alt="Toshi Order Pixel Mascot" 
            class="toshi-mascot"
          >

          <div class="cta-buttons">
            <a href="https://ordinals.com/inscription/1a4487aeb9de2c8dcf36f3e531a038d8a3acfeeb0bd123aeb7212a82c334ad15i0" class="btn btn-primary" target="_blank">
              VIEW ON-CHAIN GALLERY
            </a>
            <a href="https://discord.gg/cRw9GWWDXc" class="btn btn-outline" target="_blank">
              ENTER DISCORD
            </a>
          </div>
        </div>
      </div>
    </section>

    <div class="power-statement">
      POWER TO THE ORDER<br>POWER TO BITCOIN
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="https://x.com/TheToshiOrder" target="_blank">𝕏</a>
        <a href="https://discord.gg/cRw9GWWDXc" target="_blank">DISCORD</a>
        <a href="https://ordinalswallet.com/collection/toshis" target="_blank">MARKET</a>
        <a href="https://thetoshiorder.org" target="_blank">SITE</a>
      </div>
    </div>
  </footer>

</body>
</html>
